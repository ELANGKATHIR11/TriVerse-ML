name: TriVerse ML CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Python linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black

    - name: Run Python Linter (flake8)
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/unified_api/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 backend/unified_api/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Install Frontend dependencies
      working-directory: frontend/unified_dashboard
      run: npm ci

    - name: Run Frontend Linter
      working-directory: frontend/unified_dashboard
      run: npm run lint

  backend-tests:
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PyTorch (CPU version for speed)
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install backend requirements
      run: |
        pip install -r backend/unified_api/requirements.txt
        pip install pytest-asyncio pytest-cov

    - name: Run Task 1 Unit Tests
      run: |
        pytest CodeAlpha_Task1_CreditScoring/tests/

    - name: Run Task 2 Unit Tests
      run: |
        pytest CodeAlpha_Task2_EmotionRecognition/tests/

    - name: Run Task 3 Unit Tests
      run: |
        pytest CodeAlpha_Task3_HandwrittenRecognition/tests/

    - name: Run Unified API Unit Tests
      env:
        PYTHONPATH: backend/unified_api
      run: |
        pytest backend/unified_api/tests/ --asyncio-mode=auto --ignore=backend/unified_api/tests/test_integration.py

  frontend-build-and-integration:
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install PyTorch (CPU version)
      run: |
        python -m pip install --upgrade pip
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install backend requirements
      run: |
        pip install -r backend/unified_api/requirements.txt
        pip install pytest-asyncio

    - name: Install Frontend dependencies
      working-directory: frontend/unified_dashboard
      run: npm ci

    - name: Build Frontend Production Build
      working-directory: frontend/unified_dashboard
      run: npm run build

    - name: Run E2E Frontend-Backend Integration Test
      env:
        PYTHONPATH: backend/unified_api
      run: |
        pytest backend/unified_api/tests/test_integration.py --asyncio-mode=auto
