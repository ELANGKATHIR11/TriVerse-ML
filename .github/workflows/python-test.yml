name: Python Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx fastapi uvicorn sqlalchemy aiosqlite alembic pydantic pydantic-settings python-jose passlib python-multipart aiofiles numpy pandas scikit-learn optuna pytorch-tabnet
        # Install CPU-only PyTorch/torchvision for fast Action builds
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Run Task 1 Tests
      run: |
        pytest CodeAlpha_Task1_CreditScoring/tests/

    - name: Run Task 2 Tests
      run: |
        pytest CodeAlpha_Task2_EmotionRecognition/tests/

    - name: Run Task 3 Tests
      run: |
        pytest CodeAlpha_Task3_HandwrittenRecognition/tests/
